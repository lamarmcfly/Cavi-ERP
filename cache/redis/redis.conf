# Redis configuration for Cavi ERP.
# Redis is used as (1) a read-through cache and (2) a pub/sub event bus.
# The durable record lives in Postgres' event_log, so a modest persistence
# setting here is acceptable.

# Keep an append-only file so a restart doesn't drop in-flight cache state.
appendonly yes
appendfsync everysec

# Cap memory and evict the least-recently-used *cache* keys under pressure.
# Pub/sub messages are not stored, so this only bounds cached lookups.
maxmemory 256mb
maxmemory-policy allkeys-lru
