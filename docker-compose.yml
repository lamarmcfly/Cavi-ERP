# Local/dev stack for Cavi ERP.
#   docker compose up -d                 # infra + Vault + migrations
#   docker compose --profile agents up -d # + the six bus agents
# Migrations run via the tracked runner (scripts.migrate), not initdb, so an
# existing volume upgrades cleanly. PRODUCTION must override the *_PASSWORD and
# *_SECRET values below.

x-db-env: &db-env
  CAVI_POSTGRES_HOST: postgres
  CAVI_POSTGRES_PORT: "5432"
  CAVI_POSTGRES_DB: cavi_erp
  CAVI_POSTGRES_USER: cavi
  CAVI_POSTGRES_PASSWORD: ${CAVI_POSTGRES_PASSWORD:-change-me}

x-bus-env: &bus-env
  CAVI_REDIS_HOST: redis
  CAVI_REDIS_PORT: "6379"

# Shared config for the six bus agents (build once, differ only by command).
x-agent: &agent
  build: .
  restart: unless-stopped
  environment: &agent-env
    <<: [*db-env, *bus-env]
    CAVI_HEALTH_HOST: 0.0.0.0
    CAVI_HEALTH_PORT: "8080"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
    migrate:
      condition: service_completed_successfully
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/healthz', timeout=3).status==200 else 1)"]
    interval: 15s
    timeout: 5s
    retries: 5
  profiles: ["agents"]

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cavi_erp
      POSTGRES_USER: cavi
      POSTGRES_PASSWORD: ${CAVI_POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cavi -d cavi_erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - ./cache/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro

  # One-shot: create the schema (tracked) + load the schema registry, then exit.
  migrate:
    build: .
    command: ["sh", "-c", "python -m scripts.migrate && python -m scripts.bootstrap"]
    environment:
      <<: *db-env
      CAVI_SCHEMA_REGISTRY_DIR: schema_registry/schemas
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Vault HTTP service — the only component that holds raw ERP credentials.
  vault:
    build: .
    command: ["python", "-m", "agents.vault.service"]
    ports:
      # Host 8080 is often taken; publish on 8088. In-network: http://vault:8080.
      - "8088:8080"
    environment:
      CAVI_VAULT_HOST: 0.0.0.0
      CAVI_VAULT_PORT: "8080"
      CAVI_VAULT_STORE: memory
      CAVI_VAULT_SEED_TENANT: tenant-acme
      # Fail-closed shared secret. Dev default for local up; PRODUCTION overrides.
      CAVI_VAULT_API_SECRET: ${CAVI_VAULT_API_SECRET:-dev-vault-secret}
      NETSUITE_ACCOUNT_ID: ${NETSUITE_ACCOUNT_ID:-1234567_SB1}
      NETSUITE_CONSUMER_KEY: ${NETSUITE_CONSUMER_KEY:-demo-consumer-key}
      NETSUITE_CONSUMER_SECRET: ${NETSUITE_CONSUMER_SECRET:-demo-consumer-secret}
      NETSUITE_TOKEN_ID: ${NETSUITE_TOKEN_ID:-demo-token-id}
      NETSUITE_TOKEN_SECRET: ${NETSUITE_TOKEN_SECRET:-demo-token-secret}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/healthz', timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- the six bus agents (profile: agents) ---
  ledger:
    <<: *agent
    command: ["python", "-m", "agents.ledger.agent"]
  forge:
    <<: *agent
    command: ["python", "-m", "agents.forge.agent"]
  ticker:
    <<: *agent
    command: ["python", "-m", "agents.ticker.agent"]
  mapper:
    <<: *agent
    command: ["python", "-m", "agents.mapper.agent"]
  beacon:
    <<: *agent
    command: ["python", "-m", "agents.beacon.agent"]
    environment:
      <<: *agent-env
      CAVI_HERMES_WEBHOOK_URL: ${CAVI_HERMES_WEBHOOK_URL:-}
      CAVI_BEACON_TARGET: ${CAVI_BEACON_TARGET:-telegram:1370595013}

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      N8N_PORT: 5678
      GENERIC_TIMEZONE: UTC
      VAULT_URL: http://vault:8080
      CAVI_VAULT_API_SECRET: ${CAVI_VAULT_API_SECRET:-dev-vault-secret}
      NETSUITE_REST_URL: ${NETSUITE_REST_URL:-https://1234567-sb1.suitetalk.api.netsuite.com/services/rest}
      HERMES_WEBHOOK_URL: ${HERMES_WEBHOOK_URL:-http://host.docker.internal:9000/notify}
    volumes:
      - n8ndata:/home/node/.n8n
      - ./middleware/n8n/workflows:/workflows:ro
    depends_on:
      - postgres
      - redis
      - vault

volumes:
  pgdata:
  n8ndata:
